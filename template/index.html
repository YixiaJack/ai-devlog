<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Devlog · idea tree</title>
  <style>/*__STYLE__*/</style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand"><span class="dot"></span><span id="proj-name">AI Devlog</span></div>
      <div class="sub" id="proj-sub"></div>
      <div class="spacer"></div>
      <div class="stats" id="stats"></div>
      <input id="search" type="search" placeholder="Search ideas, prompts, code…" />
      <div class="menu-wrap">
        <button id="export" title="Export the idea tree">⬇ Export</button>
        <div id="export-menu" class="menu" hidden>
          <button data-fmt="md">Markdown · .md</button>
          <button data-fmt="json">Data · .json</button>
        </div>
      </div>
      <button id="theme" title="Light / dark">🌙</button>
      <button id="lang" title="Switch language">EN</button>
      <button id="reset">Reset view</button>
    </header>
    <svg id="canvas">
      <g id="viewport">
        <g id="links"></g>
        <g id="nodes"></g>
      </g>
    </svg>
    <div class="legend" id="legend"></div>
    <aside class="drawer" id="drawer">
      <button id="drawer-close" title="Close">×</button>
      <div id="drawer-body"></div>
    </aside>
  </div>
  <script id="devlog-data" type="application/json">/*__DATA__*/</script>
  <script>/*__APP__*/</script>
</body>
</html>
